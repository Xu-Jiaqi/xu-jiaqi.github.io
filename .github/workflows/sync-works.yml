name: Sync to Gist

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '_thoughts/**'
      - '_works/Notes/**'
      - '_works/Papers/**'
      - '_dates/thoughts_dates.json'
      - '_dates/works_dates.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and sync to Gist and repo data
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from pathlib import Path

          gist_token = os.environ.get('GIST_TOKEN', '')

          gist_files = {}

          # ===== Thoughts =====
          thoughts_dates_file = Path('_dates/thoughts_dates.json')
          thoughts = []
          if thoughts_dates_file.exists():
            with open(thoughts_dates_file, 'r') as f:
              dates = json.load(f)
            thoughts_folder = Path('_thoughts')
            if thoughts_folder.exists():
              for txt_file in sorted(thoughts_folder.glob('*.txt')):
                with open(txt_file, 'r', encoding='utf-8') as f:
                  content = f.read().strip()
                filename = txt_file.name
                time_str = dates.get(filename, str(os.path.getmtime(txt_file)))
                thoughts.append({
                  'id': hash(filename) % 10**12,
                  'content': content,
                  'time': time_str
                })

          thoughts.sort(key=lambda x: x['time'], reverse=True)
          gist_files['thoughts.json'] = json.dumps({'thoughts': thoughts}, ensure_ascii=False, indent=2)
          print(f'Thoughts: {len(thoughts)} items')

          # ===== Works =====
          works_dates_file = Path('_dates/works_dates.json')
          works = []
          if works_dates_file.exists():
            with open(works_dates_file, 'r') as f:
              dates = json.load(f)
            for category in ['Notes', 'Papers']:
              folder = Path(f'_works/{category}')
              if not folder.exists():
                continue
              for md_file in sorted(folder.glob('*.md')):
                with open(md_file, 'r', encoding='utf-8') as f:
                  content = f.read()
                title = md_file.stem
                for line in content.split('\n'):
                  if line.startswith('# '):
                    title = line[2:].strip()
                    break
                filename = md_file.name
                time_str = dates.get(filename, str(os.path.getmtime(md_file)))
                works.append({
                  'id': hash(filename) % 10**12,
                  'title': title,
                  'category': category.lower().rstrip('s'),
                  'content': content,
                  'time': time_str
                })

          works.sort(key=lambda x: x['time'], reverse=True)
          gist_files['works.json'] = json.dumps({'works': works}, ensure_ascii=False, indent=2)
          print(f'Works: {len(works)} items')

          # Write local data files
          os.makedirs('data', exist_ok=True)
          with open('data/thoughts.json', 'w', encoding='utf-8') as f:
            f.write(gist_files['thoughts.json'])
          with open('data/works.json', 'w', encoding='utf-8') as f:
            f.write(gist_files['works.json'])
          print('Wrote data/thoughts.json and data/works.json')

          # Build final payload - content values must be raw strings
          files_payload = {}
          for name, content in gist_files.items():
            files_payload[name] = {'content': content}

          payload = json.dumps({'files': files_payload}, ensure_ascii=False)

          # Upload via curl
          import urllib.request
          data = payload.encode()
          req = urllib.request.Request(
            'https://api.github.com/gists/c54f62bb3a10ff3d8dc8689d06b4ff20',
            data=data,
            headers={
              'Authorization': 'Bearer ' + gist_token,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            },
            method='PATCH'
          )
          with urllib.request.urlopen(req) as resp:
            result = json.loads(resp.read())
            print(f"Gist updated: {result.get('id')}")
          PYEOF

          # Commit and push data files back to repo (if changed)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/thoughts.json data/works.json || true
          if git commit -m "ci: update generated data files [skip ci]" >/dev/null 2>&1; then
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}
            git push origin HEAD:main || echo "push failed"
          else
            echo "No data changes to commit"
          fi
