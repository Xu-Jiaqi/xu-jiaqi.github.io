name: Sync Works to Gist

on:
  push:
    branches: [main]
    paths:
      - '_works/Notes/**'
      - '_works/Papers/**'
      - '_dates/works_dates.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build works JSON and upload to Gist
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from pathlib import Path

          # Load dates
          with open('_dates/works_dates.json', 'r') as f:
            dates = json.load(f)

          works = []

          for category in ['Notes', 'Papers']:
            folder = Path(f'_works/{category}')
            if not folder.exists():
              continue
            for md_file in sorted(folder.glob('*.md')):
              with open(md_file, 'r', encoding='utf-8') as f:
                content = f.read()

              # Title from first h1 or filename
              title = md_file.stem
              for line in content.split('\n'):
                if line.startswith('# '):
                  title = line[2:].strip()
                  break

              # Get time from dates file, fallback to file mtime
              filename = md_file.name
              time_str = dates.get(filename, None)
              if not time_str:
                time_str = str(os.path.getmtime(md_file))

              works.append({
                'id': hash(filename) % 10**12,
                'title': title,
                'category': category.lower().rstrip('s'),
                'content': content,
                'time': time_str
              })

          # Sort by time, newest first
          works.sort(key=lambda x: x['time'], reverse=True)

          output = json.dumps({'works': works}, ensure_ascii=False, indent=2)
          with open('works.json', 'w', encoding='utf-8') as f:
            f.write(output)
          print(f'Generated works.json with {len(works)} items')
          PYEOF

          FILE_CONTENT=$(cat works.json | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GIST_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/c54f62bb3a10ff3d8dc8689d06b4ff20 \
            -d "{\"files\":{\"works.json\":{\"content\":${FILE_CONTENT}}}}"
