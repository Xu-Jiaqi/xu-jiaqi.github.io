<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 - Xu-Jiaqi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">Xu-Jiaqi</a>
      <div class="nav-links">
        <a href="thoughts.html">日有所思</a>
        <a href="works.html" class="active">作品集</a>
      </div>
    </nav>
  </header>

  <main class="works-layout">
    <aside class="works-sidebar">
      <h3>文章列表</h3>
      <ul class="works-list" id="works-list">
        <!-- List items will be loaded here -->
      </ul>
    </aside>
    <article class="works-content" id="works-content">
      <div class="works-empty">
        <p>选择一个作品查看内容</p>
      </div>
    </article>
  </main>

  <section class="add-work">
    <h3>添加新作品</h3>
    <form id="work-form">
      <input type="text" id="work-title" placeholder="标题">
      <textarea id="work-content" placeholder="内容..." rows="10"></textarea>
      <button type="submit">发布</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Xu-Jiaqi</p>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/works.js"></script>
</body>
</html>
